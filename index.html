<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Owen City Rescue</title>
<style>
  body { margin:0; background:#222; font-family:Arial, sans-serif; color:white; text-align:center; }
  canvas { background:#87ceeb; display:block; margin:10px auto; border:4px solid #111; }
  button { font-size:16px; margin:4px; padding:10px 14px; border-radius:10px; cursor:pointer; }
  #ui { max-width:900px; margin:auto; }
</style>
</head>
<body>
<h2>🚨 Owen City Rescue - 시장 Owen의 도시 구하기</h2>
<div id="ui">
  <div>
    <button onclick="selectUnit('police')">🚓 경찰차</button>
    <button onclick="selectUnit('fire')">🚒 소방차</button>
    <button onclick="selectUnit('ambulance')">🚑 구급차</button>
    <button onclick="selectUnit('tow')">🚛 견인차</button>
    <button onclick="selectUnit('garbage')">🚚 쓰레기차</button>
  </div>
  <p id="status">출동할 차량을 선택하세요!</p>
</div>
<canvas id="game" width="900" height="560"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const statusEl = document.getElementById("status");

let selectedUnit = null;
let support = 60;
let day = 1;
let hour = 8;
let isNight = false;
let electionTimer = 90;
let gameOver = false;
let event = null;
let vehicles = [];
let people = [];

const stations = {
  police: {x:70, y:430, color:"#1e5bff", label:"경찰서"},
  fire: {x:210, y:430, color:"#e02b2b", label:"소방서"},
  ambulance: {x:350, y:430, color:"#fff", label:"병원"},
  tow: {x:490, y:430, color:"#f1c40f", label:"정비소"},
  garbage: {x:630, y:430, color:"#2ecc71", label:"청소센터"}
};

const eventTypes = [
  {type:"fire", text:"건물에 불이 났어요!", need:"fire", icon:"🔥", dayWeight:3, nightWeight:2},
  {type:"sick", text:"아픈 시민이 있어요!", need:"ambulance", icon:"🤒", dayWeight:3, nightWeight:2},
  {type:"thief", text:"도둑이 나타났어요!", need:"police", icon:"🦹", dayWeight:1, nightWeight:5},
  {type:"bank", text:"은행이 털리고 있어요!", need:"police", icon:"🏦💰", dayWeight:1, nightWeight:4},
  {type:"broken", text:"차가 고장났어요!", need:"tow", icon:"🚗💨", dayWeight:3, nightWeight:2},
  {type:"trash", text:"거리에 쓰레기가 넘쳐요!", need:"garbage", icon:"🗑️", dayWeight:4, nightWeight:1},
  {type:"accident", text:"교통사고가 났어요!", need:"ambulance", icon:"💥", dayWeight:2, nightWeight:4}
];

function makePeople() {
  people = [];
  for (let i=0; i<16; i++) {
    people.push({
      x: Math.random()*780+60,
      y: Math.random()*210+170,
      dx: Math.random() > 0.5 ? 0.4 : -0.4
    });
  }
}
makePeople();

function selectUnit(unit) {
  if (gameOver) return;
  selectedUnit = unit;
  statusEl.innerText = `${unitName(unit)} 선택됨! 사건 장소를 클릭하세요.`;
  beep(700, 0.08);
}

canvas.addEventListener("click", e => {
  if (!event || !selectedUnit || gameOver) return;

  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const d = Math.hypot(mx - event.x, my - event.y);
  if (d < 70) {
    dispatch(selectedUnit);
  }
});

function dispatch(unit) {
  const start = stations[unit];
  vehicles.push({
    unit,
    x:start.x,
    y:start.y,
    tx:event.x,
    ty:event.y,
    speed:3.2
  });

  siren(unit);

  if (unit === event.need) {
    support += 8;
    statusEl.innerText = `시장 Owen의 빠른 판단! ${unitName(unit)} 출동 성공! 지지도 상승!`;
  } else {
    support -= 10;
    statusEl.innerText = `앗! 잘못된 차량이에요. ${unitName(event.need)}가 필요했어요.`;
  }

  support = Math.max(0, Math.min(100, support));
  event = null;
  selectedUnit = null;
}

function spawnEvent() {
  if (event || gameOver) return;

  let pool = [];
  eventTypes.forEach(e => {
    const w = isNight ? e.nightWeight : e.dayWeight;
    for (let i=0; i<w; i++) pool.push(e);
  });

  const picked = pool[Math.floor(Math.random()*pool.length)];
  event = {
    ...picked,
    x: Math.random()*650+120,
    y: Math.random()*210+150,
    timeLeft: 14
  };

  statusEl.innerText = `🚨 사건 발생: ${event.text}`;
  alarm();
}

function updateTime() {
  hour++;
  if (hour >= 24) {
    hour = 0;
    day++;
  }
  isNight = hour >= 19 || hour < 6;
}

function update() {
  if (gameOver) return;

  people.forEach(p => {
    p.x += p.dx;
    if (p.x < 40 || p.x > 860) p.dx *= -1;
  });

  vehicles.forEach(v => {
    const dx = v.tx - v.x;
    const dy = v.ty - v.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 3) {
      v.x += dx / dist * v.speed;
      v.y += dy / dist * v.speed;
    }
  });

  vehicles = vehicles.filter(v => Math.hypot(v.tx-v.x, v.ty-v.y) > 4);

  if (event) {
    event.timeLeft -= 1/60;
    if (event.timeLeft <= 0) {
      support -= 12;
      support = Math.max(0, support);
      statusEl.innerText = `사건 해결 실패... 시민 지지도가 떨어졌어요.`;
      event = null;
    }
  }

  electionTimer -= 1/60;
  if (electionTimer <= 0) {
    electionTimer = 90;
    if (support >= 55) {
      support += 5;
      statusEl.innerText = `🎉 시장 Owen 연임 성공! 시민들이 박수를 보냅니다!`;
      cheer();
    } else {
      gameOver = true;
      statusEl.innerText = `😢 선거 탈락... Owen 시장의 권한이 박탈되었습니다.`;
      sadSound();
    }
  }
}

function draw() {
  ctx.clearRect(0,0,900,560);

  ctx.fillStyle = isNight ? "#101633" : "#8bd3ff";
  ctx.fillRect(0,0,900,560);

  ctx.fillStyle = isNight ? "#f5f3a4" : "#ffd93d";
  ctx.beginPath();
  ctx.arc(780,70,35,0,Math.PI*2);
  ctx.fill();

  drawCity();
  drawStations();
  drawPeople();

  if (event) drawEvent();
  vehicles.forEach(drawVehicle);

  drawUI();

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,900,560);
    ctx.fillStyle = "white";
    ctx.font = "42px Arial";
    ctx.fillText("GAME OVER", 320,260);
    ctx.font = "24px Arial";
    ctx.fillText("Owen 시장이 다음 선거에서 탈락했습니다.", 245,310);
  }
}

function drawCity() {
  ctx.fillStyle = "#555";
  ctx.fillRect(0,370,900,60);
  ctx.fillRect(420,100,60,340);

  ctx.strokeStyle = "#fff";
  ctx.setLineDash([20,15]);
  ctx.beginPath();
  ctx.moveTo(0,400); ctx.lineTo(900,400);
  ctx.moveTo(450,100); ctx.lineTo(450,560);
  ctx.stroke();
  ctx.setLineDash([]);

  const buildings = [
    [80,150,90,140,"은행"], [230,120,100,170,"상가"],
    [560,130,100,160,"학교"], [710,160,90,130,"아파트"]
  ];

  buildings.forEach(b => {
    ctx.fillStyle = "#b7b7b7";
    ctx.fillRect(b[0],b[1],b[2],b[3]);
    ctx.fillStyle = "#333";
    ctx.font = "16px Arial";
    ctx.fillText(b[4], b[0]+22, b[1]+25);
    for(let x=b[0]+15; x<b[0]+b[2]-15; x+=25){
      for(let y=b[1]+45; y<b[1]+b[3]-20; y+=30){
        ctx.fillStyle = isNight ? "#ffe66d" : "#6ec6ff";
        ctx.fillRect(x,y,14,14);
      }
    }
  });
}

function drawStations() {
  Object.keys(stations).forEach(k => {
    const s = stations[k];
    ctx.fillStyle = s.color;
    ctx.fillRect(s.x-45, s.y-35, 90, 65);
    ctx.fillStyle = k === "ambulance" ? "#e74c3c" : "white";
    ctx.font = "15px Arial";
    ctx.fillText(s.label, s.x-28, s.y);
  });
}

function drawPeople() {
  people.forEach(p => {
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(p.x,p.y,6,0,Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x,p.y+6);
    ctx.lineTo(p.x,p.y+24);
    ctx.moveTo(p.x-10,p.y+14);
    ctx.lineTo(p.x+10,p.y+14);
    ctx.moveTo(p.x,p.y+24);
    ctx.lineTo(p.x-8,p.y+36);
    ctx.moveTo(p.x,p.y+24);
    ctx.lineTo(p.x+8,p.y+36);
    ctx.stroke();
  });
}

function drawEvent() {
  ctx.fillStyle = "rgba(255,255,255,0.9)";
  ctx.beginPath();
  ctx.arc(event.x,event.y,46,0,Math.PI*2);
  ctx.fill();

  ctx.font = "34px Arial";
  ctx.fillStyle = "black";
  ctx.fillText(event.icon, event.x-28, event.y+10);

  ctx.font = "15px Arial";
  ctx.fillText(Math.ceil(event.timeLeft), event.x-8, event.y+58);
}

function drawVehicle(v) {
  ctx.fillStyle = unitColor(v.unit);
  ctx.fillRect(v.x-22,v.y-13,44,26);

  ctx.fillStyle = "black";
  ctx.beginPath();
  ctx.arc(v.x-12,v.y+14,5,0,Math.PI*2);
  ctx.arc(v.x+12,v.y+14,5,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText(unitEmoji(v.unit), v.x-12, v.y+7);
}

function drawUI() {
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.fillRect(10,10,300,85);
  ctx.fillStyle = "black";
  ctx.font = "18px Arial";
  ctx.fillText(`Owen 시장 임기: Day ${day} / ${hour}:00`, 25,35);
  ctx.fillText(`시민 지지도: ${support}%`, 25,60);
  ctx.fillText(`다음 선거까지: ${Math.ceil(electionTimer)}초`, 25,85);
}

function unitName(u) {
  return {
    police:"경찰차",
    fire:"소방차",
    ambulance:"구급차",
    tow:"견인차",
    garbage:"쓰레기차"
  }[u];
}

function unitEmoji(u) {
  return {
    police:"🚓",
    fire:"🚒",
    ambulance:"🚑",
    tow:"🔧",
    garbage:"🗑️"
  }[u];
}

function unitColor(u) {
  return {
    police:"#1e5bff",
    fire:"#e74c3c",
    ambulance:"#ffffff",
    tow:"#f1c40f",
    garbage:"#2ecc71"
  }[u];
}

/* 사운드 */
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function beep(freq, duration) {
  const a = getAudio();
  const osc = a.createOscillator();
  const gain = a.createGain();
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(a.destination);
  gain.gain.value = 0.08;
  osc.start();
  osc.stop(a.currentTime + duration);
}

function alarm() {
  beep(900,0.12);
  setTimeout(()=>beep(500,0.12),150);
}

function siren(unit) {
  let count = 0;
  const timer = setInterval(() => {
    beep(count % 2 === 0 ? 760 : 420, 0.12);
    count++;
    if (count > 8) clearInterval(timer);
  }, 160);
}

function cheer() {
  beep(600,0.1);
  setTimeout(()=>beep(800,0.1),120);
  setTimeout(()=>beep(1000,0.15),250);
}

function sadSound() {
  beep(300,0.2);
  setTimeout(()=>beep(220,0.25),250);
}

setInterval(() => {
  updateTime();
}, 3000);

setInterval(() => {
  if (!event && Math.random() < 0.75) spawnEvent();
}, 5000);

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
